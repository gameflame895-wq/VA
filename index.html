<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Aria - Real Voice Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 95%; max-width: 650px; height: 92vh;
            background: rgba(0,0,0,0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .header {
            text-align: center;
            z-index: 2; position: relative;
        }

        .logo {
            font-size: 2.8em;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 0 40px rgba(255,107,107,0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255,107,107,0.5)); }
            to { filter: drop-shadow(0 0 25px rgba(255,107,107,0.8)); }
        }

        .status {
            color: #4ecdc4;
            font-size: 1.2em;
            font-weight: 600;
            padding: 12px 20px;
            background: rgba(78,205,196,0.1);
            border-radius: 25px;
            border: 2px solid rgba(78,205,196,0.3);
            min-height: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .chat-area {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            overflow-y: auto;
            border: 2px solid rgba(255,255,255,0.1);
            scroll-behavior: smooth;
            position: relative;
            z-index: 2;
        }

        .message {
            margin: 15px 0;
            padding: 18px 25px;
            border-radius: 25px;
            max-width: 90%;
            word-wrap: break-word;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .user-message {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            margin-left: auto;
            color: white;
            text-align: right;
            box-shadow: 0 8px 25px rgba(255,107,107,0.3);
        }

        .ai-message {
            background: linear-gradient(135deg, #4ecdc4, #44bdad);
            margin-right: auto;
            color: white;
            box-shadow: 0 8px 25px rgba(78,205,196,0.3);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 2; position: relative;
        }

        .main-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            width: 80px; height: 80px;
            border: none;
            border-radius: 50%;
            font-size: 2.2em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.6s ease;
        }

        .btn:hover::before {
            width: 300px; height: 300px;
        }

        .mic-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff5252);
            color: white;
            font-size: 2.5em;
        }

        .mic-listening {
            background: linear-gradient(135deg, #ff4757, #ff3742);
            animation: pulse-ring 1.5s infinite;
            box-shadow: 0 0 50px rgba(255,71,87,0.8);
        }

        .speak-btn {
            background: linear-gradient(135deg, #4ecdc4, #44bdad);
            color: white;
            font-size: 2em;
        }

        .send-btn {
            background: linear-gradient(135deg, #ffa726, #ff9800);
            color: white;
            font-size: 1.8em;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255,71,87,0.7); }
            70% { box-shadow: 0 0 0 30px rgba(255,71,87,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,71,87,0); }
        }

        .lang-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .lang-btn {
            padding: 12px 25px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            font-size: 1em;
        }

        .lang-btn.active, .lang-btn:hover {
            background: linear-gradient(135deg, #4ecdc4, #44bdad);
            border-color: #4ecdc4;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(78,205,196,0.4);
        }

        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        #textInput {
            flex: 1;
            min-width: 280px;
            max-width: 400px;
            padding: 18px 25px;
            border: 2px solid rgba(78,205,196,0.4);
            border-radius: 35px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.1em;
            outline: none;
            backdrop-filter: blur(15px);
            transition: all 0.4s ease;
        }

        #textInput:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 35px rgba(78,205,196,0.5);
            transform: scale(1.02);
        }

        #textInput::placeholder {
            color: rgba(255,255,255,0.65);
        }

        .clear-btn {
            padding: 15px 30px;
            border: 2px solid rgba(255,107,107,0.5);
            border-radius: 30px;
            background: rgba(255,107,107,0.15);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .clear-btn:hover {
            background: rgba(255,107,107,0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }

        @media (max-width: 600px) {
            .btn { width: 70px; height: 70px; font-size: 1.8em; }
            #textInput { min-width: 250px; }
            .container { padding: 20px; margin: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎙️ Aria AI</div>
            <div class="status" id="status">🔥 तैयार हूँ! बोलो या टाइप करो</div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="controls">
            <div class="main-controls">
                <button class="btn mic-btn" id="micBtn">🎤</button>
                <button class="btn speak-btn" id="speakBtn">🔊</button>
                <button class="btn send-btn" id="sendBtn">➤</button>
            </div>

            <div class="lang-controls">
                <button class="lang-btn active" id="hiBtn" data-lang="hi">🇮🇳 हिंदी</button>
                <button class="lang-btn" id="enBtn" data-lang="en">🇺🇸 English</button>
            </div>

            <div class="input-group">
                <input type="text" id="textInput" placeholder="💬 यहाँ टाइप करो... (Enter दबाओ)" autocomplete="off">
                <button class="clear-btn" id="clearBtn">🗑️ साफ़</button>
            </div>
        </div>
    </div>

    <script>
        class AriaAI {
            constructor() {
                this.recognition = null;
                this.synth = window.speechSynthesis;
                this.isListening = false;
                this.isSpeaking = false;
                this.currentLang = 'hi';
                this.conversationCount = 0;
                this.responses = {
                    hi: {
                        welcome: [
                            "नमस्ते दोस्त! 😊 मैं आरिया हूँ, बोलो क्या बात है?",
                            "हाय! तैयार हूँ आपकी मदद के लिए! 🎉",
                            "अरे वाह! मिले हुए, क्या खबर?"
                        ],
                        greetings: [
                            "हैलो! आज का दिन अच्छा हो! ☀️",
                            "नमस्कार! कैसे हो भाई?",
                            "हाय दोस्त! क्या चल रहा है?",
                            "अरे सुनो! बोलो ना!"
                        ],
                        thanks: [
                            "जी का स्वागत है! 🙏",
                            "खुशी हुई मदद करके! 😊",
                            "कोई बात नहीं दोस्त!",
                            "हमेशा तैयार हूँ!"
                        ],
                        time: () => `अभी ${new Date().toLocaleTimeString('hi-IN', {hour: 'numeric', minute: '2-digit'})} बज रहे हैं`,
                        date: () => `आज ${new Date().toLocaleDateString('hi-IN', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'})} है`,
                        jokes: [
                            "चाय ने कॉफ़ी से कहा - तू तो बस ब्लैक हो! ☕😂",
                            "मछली ने कहा - मैं तैरती हूँ, डूबती नहीं! 🐟",
                            "सूरज बोला - चाँद, रात में मिलते हैं! 🌙"
                        ],
                        howru: [
                            "मैं तो सुपर हूँ! आप बताओ? 💪",
                            "बिल्कुल फिट! आपका क्या हाल?",
                            "मस्त चल रहा है! 😎"
                        ]
                    }
                };
                this.init();
            }

            init() {
                this.setupRecognition();
                this.bindEvents();
                this.sayWelcome();
            }

            setupRecognition() {
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    this.recognition = new SpeechRecognition();
                    
                    // ✅ FIXED: Perfect settings for Hindi/English
                    this.recognition.continuous = true;
                    this.recognition.interimResults = false; // Only final results
                    this.recognition.maxAlternatives = 1;
                    this.recognition.lang = 'hi-IN'; // Hindi first
                    
                    this.recognition.onstart = () => this.onStartListening();
                    this.recognition.onresult = (e) => this.onResult(e);
                    this.recognition.onend = () => this.onEndListening();
                    this.recognition.onerror = (e) => this.onError(e);
                    
                    // Restart automatically
                    this.recognition.onend = () => {
                        if (this.isListening) {
                            setTimeout(() => this.recognition.start(), 100);
                        }
                    };
                }
            }

            bindEvents() {
                document.getElementById('micBtn').onclick = () => this.toggleMic();
                document.getElementById('speakBtn').onclick = () => this.repeatLast();
                document.getElementById('sendBtn').onclick = () => this.sendTyped();
                document.getElementById('textInput').onkeypress = (e) => {
                    if (e.key === 'Enter') this.sendTyped();
                };
                document.getElementById('hiBtn').onclick = () => this.setLang('hi');
                document.getElementById('enBtn').onclick = () => this.setLang('en');
                document.getElementById('clearBtn').onclick = () => this.clearAll();
            }

            toggleMic() {
                if (this.isListening) {
                    this.recognition.stop();
                    this.isListening = false;
                } else {
                    this.recognition.start();
                }
            }

            setLang(lang) {
                this.currentLang = lang;
                this.recognition.lang = lang === 'hi' ? 'hi-IN' : 'en-US';
                document.querySelectorAll('.lang-btn').forEach(btn => 
                    btn.classList.toggle('active', btn.dataset.lang === lang)
                );
                this.updateStatus(`🌐 ${lang === 'hi' ? 'हिंदी' : 'English'} मोड`);
            }

            onStartListening() {
                this.isListening = true;
                document.getElementById('micBtn').classList.add('mic-listening');
                this.updateStatus('🎤 सुन रहा हूँ... बोलो!');
            }

            onEndListening() {
                this.isListening = false;
                document.getElementById('micBtn').classList.remove('mic-listening');
            }

            onResult(event) {
                // ✅ FIXED: Get FINAL result only
                const lastResult = event.results[event.results.length - 1];
                if (lastResult.isFinal) {
                    const transcript = Array.from(lastResult)[0].transcript;
                    this.processInput(transcript);
                }
            }

            onError(event) {
                console.log('Speech error:', event.error);
                this.onEndListening();
            }

            sendTyped() {
                const input = document.getElementById('textInput');
                const text = input.value.trim();
                if (text) {
                    input.value = '';
                    this.processInput(text);
                }
            }

            async processInput(input) {
                this.addMessage('तुम', input, 'user');
                this.updateStatus('🤔 समझ रहा हूँ...');
                
                const response = await this.generateResponse(input.toLowerCase());
                this.addMessage('Aria AI', response, 'ai');
                this.speak(response);
            }

            generateResponse(input) {
                const res = this.responses.hi;
                
                // Perfect keyword matching
                if (input.includes('नमस्ते') || input.includes('hello') || input.includes('hi')) {
                    return this.getFresh(res.greetings);
                }
                if (input.includes('धन्यवाद') || input.includes('thanks')) {
                    return this.getFresh(res.thanks);
                }
                if (input.includes('समय') || input.includes('time')) {
                    return res.time();
                }
                if (input.includes('तारीख') || input.includes('date')) {
                    return res.date();
                }
                if (input.includes('मजाक') || input.includes('joke')) {
                    return this.getFresh(res.jokes);
                }
                if (input.includes('कैसे हो') || input.includes('how are')) {
                    return this.getFresh(res.howru);
                }
                
                return `बहुत अच्छा कहा तुमने! 😊 और क्या बात करूँ?`;
            }

            getFresh(arrayOrFunc) {
                if (typeof arrayOrFunc === 'function') return arrayOrFunc();
                
                const available = arrayOrFunc.filter((_, i) => !this.usedResponses.has(i));
                if (available.length === 0) {
                    this.usedResponses.clear();
                    return arrayOrFunc[0];
                }
                const idx = Math.floor(Math.random() * available.length);
                const response = available[idx];
                this.usedResponses.add(idx);
                return response;
            }

            speak(text) {
                if (this.isSpeaking) return;
                
                this.isSpeaking = true;
                this.updateStatus('🔊 बोल रही हूँ...');
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = this.currentLang === 'hi' ? 'hi-IN' : 'en-US';
                utterance.rate = 0.92;  // Natural speed
                utterance.pitch = 1.05; // Female voice pitch
                utterance.volume = 1;
                
                utterance.onstart = () => {
                    document.getElementById('speakBtn').style.transform = 'scale(1.1)';
                };
                
                utterance.onend = () => {
                    this.isSpeaking = false;
                    document.getElementById('speakBtn').style.transform = 'scale(1)';
                    this.updateStatus('🔥 बोलो या टाइप करो!');
                };
                
                speechSynthesis.cancel(); // Stop previous
                speechSynthesis.speak(utterance);
            }

            repeatLast() {
                const messages = document.querySelectorAll('.ai-message');
                if (messages.length > 0) {
                    const lastText = messages[messages.length-1].textContent;
                    this.speak(lastText.replace('Aria AI: ', ''));
                }
            }

            addMessage(sender, text, type) {
                const chat = document.getElementById('chatArea');
                const div = document.createElement('div');
                div.className = `message ${type}-message`;
                div.innerHTML = `<strong>${sender}:</strong> ${text}`;
                chat.appendChild(div);
                chat.scrollTop = chat.scrollHeight;
            }

            updateStatus(text) {
                document.getElementById('status').textContent = text;
            }

            sayWelcome() {
                setTimeout(() => {
                    const welcome = this.responses.hi.welcome[0];
                    this.addMessage('Aria AI', welcome, 'ai');
                    this.speak(welcome);
                }, 800);
            }

            clearAll() {
                document.getElementById('chatArea').innerHTML = '';
                this.usedResponses.clear();
                this.sayWelcome();
            }
        }

        // Start Aria AI
        window.addEventListener('load', () => new AriaAI());
    </script>
</body>
  
  </html>
