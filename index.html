<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackbox AI Voice Assistant - MALE VOICE ULTRA FAST</title>
    <style>
        /* SAME BEAUTIFUL STYLES - CLEAN CHAT */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #0a3d0a 25%, #1a5c1a 50%, #0a3d0a 75%, #000000 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(0, 255, 127, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(0, 255, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
            animation: bgPulse 4s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .assistant-container {
            background: rgba(0, 30, 0, 0.95);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(0, 255, 127, 0.3);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0, 255, 127, 0.3), 
                        inset 0 0 30px rgba(0, 255, 127, 0.1);
            width: 90%;
            max-width: 550px;
            text-align: center;
            position: relative;
            z-index: 2;
            animation: containerGlow 2s ease-out;
        }

        @keyframes containerGlow {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .avatar {
            width: 130px;
            height: 130px;
            background: linear-gradient(45deg, #00ff7f, #00ff00, #7fff00);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            color: #000;
            box-shadow: 0 20px 40px rgba(0, 255, 127, 0.5);
            animation: avatarPulse 2.5s infinite;
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 20px 40px rgba(0, 255, 127, 0.5); transform: scale(1); }
            50% { box-shadow: 0 30px 60px rgba(0, 255, 127, 0.8); transform: scale(1.08); }
        }

        .status {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0, 255, 127, 0.5);
            min-height: 24px;
        }

        .status.error { color: #ff6b6b; text-shadow: 0 0 15px #ff6b6b; }
        .status.permission { color: #ffaa00; text-shadow: 0 0 15px #ffaa00; animation: pulseWarning 2s infinite; }
        @keyframes pulseWarning { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .listening .status { color: #00ff7f !important; animation: statusBlink 1s infinite; text-shadow: 0 0 20px #00ff7f; }
        @keyframes statusBlink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.6; } }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .mic-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff007f, #ff4d94);
            color: white;
            font-size: 28px;
            box-shadow: 0 15px 35px rgba(255, 0, 127, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.2);
        }

        .mic-btn:hover:not(:disabled) { transform: scale(1.15); box-shadow: 0 20px 45px rgba(255, 0, 127, 0.6); }
        .mic-btn.listening { background: linear-gradient(45deg, #00ff7f, #00ff00); animation: micPulse 0.6s infinite; box-shadow: 0 0 40px rgba(0, 255, 127, 0.8); border-color: rgba(0, 255, 127, 0.5); }
        @keyframes micPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        .speak-btn {
            background: linear-gradient(45deg, #00ff7f, #7fff00);
            color: #000;
            box-shadow: 0 10px 25px rgba(0, 255, 127, 0.4);
            min-width: 140px;
        }

        .speak-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 255, 127, 0.6); }
        .speak-btn.active { background: linear-gradient(45deg, #ff6b9d, #ff1493); color: white; animation: speakGlow 1s infinite alternate; }
        @keyframes speakGlow { from { box-shadow: 0 10px 25px rgba(255, 107, 157, 0.6); } to { box-shadow: 0 15px 40px rgba(255, 20, 147, 0.8); } }

        .voice-toggle {
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            color: white;
            font-size: 14px;
            padding: 12px 20px;
        }

        .voice-toggle:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(255, 107, 53, 0.5); }

        .lang-toggle {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-size: 14px;
            padding: 12px 20px;
        }

        .lang-toggle:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(102, 126, 234, 0.5); }

        .clear-btn {
            background: linear-gradient(45deg, #ff4757, #ff3838);
            color: white;
            font-size: 14px;
            padding: 12px 20px;
        }

        .clear-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(255, 71, 87, 0.5); }

        .btn:disabled {
            background: #333 !important;
            color: #666 !important;
            cursor: not-allowed;
            transform: none;
        }

        .permission-info {
            background: rgba(255, 170, 0, 0.2);
            border: 1px solid rgba(255, 170, 0, 0.5);
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            color: #ffaa00;
            font-size: 14px;
            font-weight: 500;
        }

        .chat-container {
            height: 320px;
            overflow-y: auto;
            margin: 25px 0;
            padding: 20px;
            background: rgba(0, 50, 0, 0.6);
            border-radius: 25px;
            text-align: left;
            border: 1px solid rgba(0, 255, 127, 0.2);
            scrollbar-width: thin;
            scrollbar-color: #00ff7f #1a1a1a;
        }

        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: rgba(0, 50, 0, 0.5); border-radius: 10px; }
        .chat-container::-webkit-scrollbar-thumb { background: #00ff7f; border-radius: 10px; }

        .message {
            margin: 12px 0;
            padding: 15px 22px;
            border-radius: 25px;
            max-width: 90%;
            word-wrap: break-word;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .user-message {
            background: linear-gradient(45deg, #ff007f, #ff4d94);
            color: white;
            margin-left: auto;
            text-align: right;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.4);
        }

        .ai-message {
            background: linear-gradient(45deg, #00ff7f, #7fff00);
            color: #000;
            margin-right: auto;
            font-weight: 500;
            box-shadow: 0 8px 25px rgba(0, 255, 127, 0.3);
        }

        .commands {
            font-size: 13px;
            color: #00ff7f;
            margin-top: 20px;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(0, 255, 127, 0.5);
        }

        .commands span {
            background: rgba(0, 255, 127, 0.2);
            padding: 6px 12px;
            border-radius: 15px;
            margin: 3px;
            font-size: 12px;
            border: 1px solid rgba(0, 255, 127, 0.3);
        }

        @media (max-width: 480px) {
            .assistant-container { padding: 30px 20px; margin: 20px; }
            .controls { flex-direction: column; align-items: center; }
            .mic-btn { width: 80px; height: 80px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="assistant-container" id="assistant">
        <div class="avatar" id="avatar">🤖</div>
        <div class="status" id="status">Ready! Press 🎤 or Spacebar | तैयार! 🎤 दबाएं</div>
        
        <div id="permissionInfo" class="permission-info" style="display: none;">
            🔊 <strong>Microphone Permission Required!</strong><br>
            Click any button to enable microphone. <strong>HTTPS required</strong>.
        </div>
        
        <div class="controls">
            <button class="btn mic-btn" id="micButton" title="Single listen (Spacebar)">🎤</button>
            <button class="btn speak-btn" id="speakButton" title="Continuous listening">Speak Now</button>
            <button class="btn voice-toggle" id="voiceToggle">🔊 Male</button>
            <button class="btn lang-toggle" id="langToggle">🇮🇳 Hindi</button>
            <button class="btn clear-btn" id="clearBtn">🗑️ Clear</button>
        </div>
        
        <!-- CLEAN EMPTY CHAT - NO WELCOME MESSAGE -->
        <div class="chat-container" id="chatContainer"></div>
        
        <div class="commands">
            Try: <span>"Kya haal hai?"</span> <span>"Time kya hai?"</span> 
            <span>"15*23?"</span> <span>"Joke sunao"</span>
        </div>
    </div>

    <script>
        class BlackboxVoiceAssistantULTRAFAST {
            constructor() {
                this.hasPermission = false;
                this.recognition = null;
                this.synthesis = window.speechSynthesis;
                this.isListening = false;
                this.continuousMode = false;
                this.currentLang = 'hi-IN';  // Hindi by default
                this.isMaleVoice = true;
                this.chatHistory = [];
                this.timer = null;
                this.availableVoices = [];
                
                this.init();
            }

            async init() {
                await this.checkHTTPS();
                this.initSpeechRecognition();
                this.initElements();
                this.loadVoices();
                this.status.textContent = this.currentLang === 'hi-IN' ? 
                    'तैयार! 🎤 दबाएं | Ready!' : 'Ready! Press 🎤';
            }

            loadVoices() {
                this.availableVoices = speechSynthesis.getVoices();
                speechSynthesis.onvoiceschanged = () => {
                    this.availableVoices = speechSynthesis.getVoices();
                    this.selectMaleVoice();
                };
            }

            selectMaleVoice() {
                let selectedVoice = null;
                
                if (this.currentLang === 'hi-IN') {
                    const hindiVoices = this.availableVoices.filter(voice => 
                        voice.lang.startsWith('hi')
                    );
                    selectedVoice = hindiVoices[0];
                } else {
                    const englishVoices = this.availableVoices.filter(voice => 
                        voice.lang.startsWith('en')
                    );
                    selectedVoice = englishVoices.find(v => v.name.includes('Google')) ||
                                   englishVoices.find(v => v.name.includes('Microsoft')) ||
                                   englishVoices[0];
                }
                
                this.selectedVoice = selectedVoice || this.availableVoices[0];
                this.updateVoiceToggle();
            }

            toggleVoice() {
                this.isMaleVoice = !this.isMaleVoice;
                this.selectMaleVoice();
                const msg = this.currentLang === 'hi-IN' ? 
                    `आवाज ${this.isMaleVoice ? 'पुरुष' : 'महिला'}` : 
                    `Voice: ${this.isMaleVoice ? 'Male' : 'Female'}`;
                this.addMessage(msg, 'ai');
            }

            updateVoiceToggle() {
                this.voiceToggle.textContent = this.isMaleVoice ? '🔊 Male' : '🔊 Female';
            }

            clearChat() {
                this.chatContainer.innerHTML = '';
                this.addMessage('🧹 Chat cleared! बोलो भाई...', 'ai');
            }

            async checkHTTPS() {
                if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                    this.showPermissionInfo("⚠️ HTTPS required! Use GitHub Pages/Netlify.");
                    return false;
                }
                return true;
            }

            initElements() {
                this.micButton = document.getElementById('micButton');
                this.speakButton = document.getElementById('speakButton');
                this.voiceToggle = document.getElementById('voiceToggle');
                this.langToggle = document.getElementById('langToggle');
                this.clearBtn = document.getElementById('clearBtn');
                this.status = document.getElementById('status');
                this.chatContainer = document.getElementById('chatContainer');
                this.assistant = document.getElementById('assistant');
                this.permissionInfo = document.getElementById('permissionInfo');

                this.micButton.addEventListener('click', () => this.requestPermissionAndListen());
                this.speakButton.addEventListener('click', () => this.toggleContinuous());
                this.voiceToggle.addEventListener('click', () => this.toggleVoice());
                this.langToggle.addEventListener('click', () => this.toggleLanguage());
                this.clearBtn.addEventListener('click', () => this.clearChat());
            }

            async requestPermissionAndListen() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(track => track.stop());
                    
                    this.hasPermission = true;
                    this.permissionInfo.style.display = 'none';
                    this.singleListen();
                    
                } catch (error) {
                    this.showPermissionError("❌ Allow microphone in browser settings.");
                }
            }

            initSpeechRecognition() {
                const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
                if (!SpeechRecognition) {
                    this.showPermissionError("❌ Use Chrome/Edge for voice.");
                    return;
                }

                this.recognition = new SpeechRecognition();
                this.recognition.continuous = false;
                this.recognition.interimResults = false;
                this.recognition.lang = this.currentLang;
                
                this.recognition.onstart = () => this.onListeningStart();
                this.recognition.onresult = (event) => this.onSpeechResult(event);
                this.recognition.onend = () => this.onListeningEnd();
                this.recognition.onerror = (event) => this.onSpeechError(event);
            }

            singleListen() {
                if (!this.hasPermission || !this.recognition) {
                    this.requestPermissionAndListen();
                    return;
                }
                this.continuousMode = false;
                this.speakButton.classList.remove('active');
                this.recognition.start();
            }

            toggleContinuous() {
                if (!this.hasPermission || !this.recognition) {
                    this.requestPermissionAndListen();
                    return;
                }
                
                this.continuousMode = !this.continuousMode;
                if (this.continuousMode) {
                    this.speakButton.classList.add('active');
                    this.speakButton.textContent = '🛑 Stop';
                    this.recognition.start();
                } else {
                    this.speakButton.classList.remove('active');
                    this.speakButton.textContent = 'Continuous';
                    this.recognition.stop();
                }
            }

            toggleLanguage() {
                this.currentLang = this.currentLang === 'en-US' ? 'hi-IN' : 'en-US';
                if (this.recognition) this.recognition.lang = this.currentLang;
                this.selectMaleVoice();
                this.updateStatus();
                this.langToggle.textContent = this.currentLang === 'hi-IN' ? '🇺🇸 English' : '🇮🇳 Hindi';
            }

            updateStatus() {
                const isHindi = this.currentLang === 'hi-IN';
                this.status.textContent = isHindi ? 'बोलो भाई! | Speak!' : 'Speak now!';
            }

            onListeningStart() {
                this.isListening = true;
                this.assistant.classList.add('listening');
                this.status.textContent = this.currentLang === 'hi-IN' ? 'सुन रहा हूँ...' : 'Listening...';
                this.micButton.textContent = '🔴';
            }

            onSpeechResult(event) {
                const transcript = event.results[0][0].transcript.trim();
                this.addMessage(`🎤 ${transcript}`, 'user');
                // ULTRA FAST RESPONSE - NO DELAY
                const response = this.getSmartResponse(transcript);
                this.addMessage(response, 'ai');
                this.speak(response);
            }

            onListeningEnd() {
                this.isListening = false;
                this.assistant.classList.remove('listening');
                this.micButton.textContent = '🎤';
                
                if (this.continuousMode && this.hasPermission) {
                    setTimeout(() => {
                        if (this.continuousMode) this.recognition.start();
                    }, 200);
                } else {
                    this.updateStatus();
                }
            }

            onSpeechError(event) {
                if (event.error === 'not-allowed') {
                    this.showPermissionError("❌ Allow microphone.");
                } else if (this.continuousMode) {
                    setTimeout(() => this.recognition.start(), 500);
                }
            }

            getSmartResponse(input) {
                const text = input.toLowerCase();
                const isHindi = this.currentLang === 'hi-IN';

                // VOICE CHECK
                if (text.includes('voice') || text.includes('आवाज')) {
                    return this.isMaleVoice ? 'पुरुष आवाज चालू!' : 'महिला आवाज चालू!';
                }

                // GREETING
                if (text.includes('hello') || text.includes('hi') || text.includes('नमस्ते')) {
                    return isHindi ? "नमस्ते भाई!" : "Hello bro!";
                }

                // HOW ARE YOU
                if (text.includes('how are') || text.includes('kya haal') || text.includes('कैसा')) {
                    return isHindi ? "ठीक हूँ भाई! तुम बताओ?" : "Great bro! You?";
                }

                // TIME
                if (text.includes('time') || text.includes('समय')) {
                    const now = new Date();
                    return `${now.toLocaleTimeString(this.currentLang === 'hi-IN' ? 'hi-IN' : 'en-US', 
                        {hour: '2-digit', minute: '2-digit'})}`;
                }

                // MATH - ULTRA FAST
                const mathMatch = text.match(/(\d+(?:\.\d+)?)\s*([+\-*/])\s*(\d+(?:\.\d+)?)/);
                if (mathMatch) {
                    const [, a, op, b] = mathMatch;
                    const num1 = parseFloat(a), num2 = parseFloat(b);
                    let result;
                    switch(op) {
                        case '+': result = num1 + num2; break;
                        case '-': result = num1 - num2; break;
                        case '*': result = num1 * num2; break;
                        case '/': result = num1 / num2; break;
                    }
                    return `${result}`;
                }

                // TIMER
                const timerMatch = text.match(/(\d+)\s*(min|मिनट)/);
                if (timerMatch) {
                    const minutes = parseInt(timerMatch[1]);
                    this.setTimer(minutes);
                    return isHindi ? `${minutes} मिनट!` : `${minutes} min!`;
                }

                // JOKE
                if (text.includes('joke') || text.includes('मजाक')) {
                    const jokes = isHindi ? 
                        ["डॉक्टर: सोफे पर बैठो! 😂"] : 
                        ["Atoms make up everything! 😂"];
                    return jokes[Math.floor(Math.random() * jokes.length)];
                }

                // FALLBACKS
                const fallbacks = isHindi ? 
                    ["हाँ भाई!", "बताओ!", "हुं!", "क्या?", "बोलो!"] : 
                    ["Yes bro!", "Tell me!", "Yeah?", "What?", "Go ahead!"];
                
                return fallbacks[Math.floor(Math.random() * fallbacks.length)];
            }

            setTimer(minutes) {
                clearTimeout(this.timer);
                const ms = minutes * 60 * 1000;
                this.timer = setTimeout(() => {
                    const alertMsg = this.currentLang === 'hi-IN' ? '⏰ टाइमर खत्म!' : '⏰ Timer done!';
                    this.speak(alertMsg);
                    this.addMessage(alertMsg, 'ai');
                }, ms);
            }

            addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                messageDiv.innerHTML = text.replace(/\n/g, '<br>');
                this.chatContainer.appendChild(messageDiv);
                this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
            }

            speak(text) {
                if (this.synthesis.speaking) this.synthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 0.7;  // DEEP MALE
                utterance.volume = 1;
                utterance.lang = this.currentLang;
                
                if (this.selectedVoice) {
                    utterance.voice = this.selectedVoice;
                }
                
                this.synthesis.speak(utterance);
            }

            showPermissionInfo(msg) {
                this.permissionInfo.style.display = 'block';
                this.permissionInfo.innerHTML = msg;
                this.status.className = 'status permission';
            }

            showPermissionError(msg) {
                this.status.textContent = msg;
                this.status.className = 'status error';
            }
        }

        window.addEventListener('load', () => {
            new BlackboxVoiceAssistantULTRAFAST();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                document.getElementById('micButton').click();
            }
        });
    </script>
</body>
</html>
