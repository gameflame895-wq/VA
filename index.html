<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Voice Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 50%, #0066cc 100%);
            overflow: hidden;
        }

        .container {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 550px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 2.2em;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .status {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #00d4ff;
            font-weight: 500;
            min-height: 25px;
        }

        .response-area {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            min-height: 150px;
            max-height: 250px;
            overflow-y: auto;
            color: #fff;
            font-size: 1em;
            line-height: 1.6;
            border: 2px solid rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(5px);
            scroll-behavior: smooth;
        }

        .message {
            margin: 8px 0;
            padding: 10px;
            border-radius: 12px;
            max-width: 90%;
            word-wrap: break-word;
        }

        .user-message {
            background: rgba(0, 212, 255, 0.3);
            margin-left: auto;
            text-align: right;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background: rgba(255, 255, 255, 0.15);
            margin-right: auto;
            text-align: left;
            border-bottom-left-radius: 4px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .main-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .mic-btn, .speak-btn, .send-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            font-size: 1.6em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .mic-listening {
            background: linear-gradient(45deg, #ff4444, #ff6666);
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 25px rgba(255, 68, 68, 0.6);
        }

        .mic-idle {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: white;
        }

        .speak-btn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }

        .send-btn {
            background: linear-gradient(45deg, #ff9800, #ff6f00);
            color: white;
            font-size: 1.4em;
        }

        .mic-idle:hover, .speak-btn:hover, .send-btn:hover {
            transform: scale(1.1);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .lang-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .lang-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: white;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
        }

        .input-section {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #textInput {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 2px solid rgba(0, 212, 255, 0.4);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1em;
            outline: none;
            backdrop-filter: blur(5px);
            max-width: 300px;
        }

        #textInput::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        #textInput:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .clear-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            .mic-btn, .speak-btn, .send-btn {
                width: 60px;
                height: 60px;
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🗣️ SmartVoice AI</div>
        <div class="status" id="status">Click mic to speak or type below!</div>
        <div class="response-area" id="responseArea"></div>
        
        <div class="controls">
            <div class="main-controls">
                <button class="mic-btn mic-idle" id="micBtn" title="🎤 Speak">🎤</button>
                <button class="speak-btn" id="speakBtn" title="🔊 AI Speak">🔊</button>
                <button class="send-btn" id="sendBtn" title="📤 Send Text">📤</button>
            </div>
            
            <div class="lang-controls">
                <button class="lang-btn active" id="enBtn" data-lang="en">🇺🇸 English</button>
                <button class="lang-btn" id="hiBtn" data-lang="hi">🇮🇳 हिंदी</button>
            </div>
            
            <div class="input-section">
                <input type="text" id="textInput" placeholder="Type your message here..." autocomplete="off">
                <button class="clear-btn" id="clearBtn">Clear Chat</button>
            </div>
        </div>
    </div>

    <script>
        class SmartVoiceAssistant {
            constructor() {
                this.recognition = null;
                this.synth = window.speechSynthesis;
                this.isListening = false;
                this.isSpeaking = false;
                this.currentLang = 'en';
                this.conversationHistory = [];
                this.lastResponses = new Set();
                
                this.translations = {
                    en: {
                        status_idle: "Click mic to speak or type below!",
                        status_listening: "🎤 Listening... Speak now!",
                        status_processing: "🤔 Thinking...",
                        status_speaking: "🔊 Speaking...",
                        mic_title: "Click to speak/stop"
                    },
                    hi: {
                        status_idle: "माइक दबाएं या नीचे टाइप करें!",
                        status_listening: "🎤 सुन रहे हैं... बोलें!",
                        status_processing: "🤔 सोच रहे हैं...",
                        status_speaking: "🔊 बोल रहे हैं...",
                        mic_title: "बोलने/रोकने के लिए क्लिक करें"
                    }
                };
                
                this.init();
            }

            init() {
                // Speech Recognition
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    this.recognition = new SpeechRecognition();
                    this.setupRecognition();
                }

                // Event Listeners
                document.getElementById('micBtn').addEventListener('click', () => this.toggleListening());
                document.getElementById('speakBtn').addEventListener('click', () => this.speakLastResponse());
                document.getElementById('sendBtn').addEventListener('click', () => this.sendTextMessage());
                document.getElementById('textInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.sendTextMessage();
                });
                document.getElementById('enBtn').addEventListener('click', () => this.switchLanguage('en'));
                document.getElementById('hiBtn').addEventListener('click', () => this.switchLanguage('hi'));
                document.getElementById('clearBtn').addEventListener('click', () => this.clearChat());

                // Welcome message
                this.addMessage('SmartVoice AI', 'नमस्ते! मैं SmartVoice AI हूँ। बोलें या टाइप करें - मैं हिंदी और English दोनों में बात कर सकता हूँ! 😊', 'ai');
                this.speak('नमस्ते! मैं SmartVoice AI हूँ। बोलें या टाइप करें!');
            }

            setupRecognition() {
                this.recognition.continuous = true;
                this.recognition.interimResults = true;
                this.recognition.lang = this.currentLang === 'en' ? 'en-US' : 'hi-IN';

                this.recognition.onstart = () => this.onStart();
                this.recognition.onresult = (event) => this.onResult(event);
                this.recognition.onend = () => this.onEnd();
                this.recognition.onerror = (event) => this.onError(event);
            }

            toggleListening() {
                if (this.isListening) {
                    this.recognition.stop();
                } else {
                    this.recognition.start();
                }
            }

            switchLanguage(lang) {
                this.currentLang = lang;
                if (this.recognition) {
                    this.recognition.lang = lang === 'en' ? 'en-US' : 'hi-IN';
                }
                
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === lang);
                });
                this.updateStatus('idle');
            }

            onStart() {
                this.isListening = true;
                document.getElementById('micBtn').className = 'mic-btn mic-listening';
                this.updateStatus('listening');
            }

            onResult(event) {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }
                if (finalTranscript) {
                    this.processCommand(finalTranscript);
                }
            }

            async processCommand(command) {
                this.addMessage('You', command, 'user');
                this.updateStatus('processing');
                
                const response = await this.getSmartResponse(command.toLowerCase());
                this.addMessage('SmartVoice AI', response, 'ai');
                this.lastResponses.add(response);
                this.conversationHistory.push({ user: command, ai: response });
                
                this.speak(response);
                this.updateStatus('idle');
            }

            sendTextMessage() {
                const input = document.getElementById('textInput');
                const text = input.value.trim();
                if (text) {
                    this.processCommand(text);
                    input.value = '';
                }
            }

            speakLastResponse() {
                if (this.conversationHistory.length > 0) {
                    const lastResponse = this.conversationHistory[this.conversationHistory.length - 1].ai;
                    this.speak(lastResponse);
                }
            }

            speak(text) {
                if (this.isSpeaking) return;
                
                this.isSpeaking = true;
                this.updateStatus('speaking');
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = this.currentLang === 'en' ? 'en-US' : 'hi-IN';
                utterance.rate = 0.9;
                utterance.pitch = 1;
                utterance.volume = 1;
                
                utterance.onstart = () => {
                    document.getElementById('speakBtn').style.background = 'linear-gradient(45deg, #ff9800, #ff6f00)';
                };
                
                utterance.onend = () => {
                    this.isSpeaking = false;
                    this.updateStatus('idle');
                    document.getElementById('speakBtn').style.background = 'linear-gradient(45deg, #4CAF50, #45a049)';
                };
                
                this.synth.speak(utterance);
            }

            async getSmartResponse(input) {
                const responses = {
                    en: {
                        // Greetings
                        greetings: ['hello', 'hi', 'hey', 'namaste', 'good morning', 'good afternoon', 'good evening'],
                        responses: ['नमस्ते! कैसे हैं आप आज?', 'हाय! क्या खबर?', 'नमस्कार! आज का दिन कैसा है?', 'हैलो! मैं यहाँ हूँ आपकी मदद के लिए!'],
                        
                        // Time & Date
                        time: ['time', 'samay', 'kitna baje hai', 'what time'],
                        responses: [`अभी ${new Date().toLocaleTimeString('hi-IN')} बजे हैं।`],
                        
                        date: ['date', 'taarikh', 'aaj ka din', 'today'],
                        responses: [`आज ${new Date().toLocaleDateString('hi-IN')} है।`],
                        
                        // Weather (mock)
                        weather: ['weather', 'mausam', 'pog', 'aaj ka mausam'],
                        responses: ['आज मौसम बहुत अच्छा है! धूप और हल्की हवा। ☀️'],
                        
                        // Help
                        help: ['help', 'madad', 'kya kar sakte ho', 'what can you do'],
                        responses: ['मैं समय, तारीख बता सकता हूँ, बातचीत कर सकता हूँ, और आपकी मदद कर सकता हूँ! बोलें या टाइप करें। 😊'],
                        
                        // Jokes
                        joke: ['joke', 'mazaak', 'hassao', 'funny'],
                        responses: ['पानी पीने से पहले चाय ने कहा, "मैं गर्म हूँ!" 😂'],
                        
                        // Compliments
                        thanks: ['thank', 'thanks', 'shukriya', 'dhanyavaad'],
                        responses: ['जी का स्वागत है! 😊', 'खुशी हुई मदद करके!', 'हमेशा तैयार हूँ!'],
                        
                        // Conversation
                        howareyou: ['how are you', 'kaise ho', 'kya haal'],
                        responses: ['मैं बिल्कुल ठीक हूँ! आप बताइए?', 'बहुत अच्छा हूँ! धन्यवाद पूछने के लिए!'],
                        
                        name: ['name', 'naam', 'kaun ho'],
                        responses: ['मेरा नाम SmartVoice AI है! 😎', 'मैं SmartVoice AI हूँ, आपकी आवाज का दोस्त!'],
                        
                        default: ['मैंने सुना लेकिन समझ नहीं पाया। और साफ बोलें या टाइप करें!', 'कृपया थोड़ा और विस्तार से बताएं!', 'मुझे और जानकारी चाहिए!']
                    }
                };

                // Check for matches
                for (let category in responses.en) {
                    if (responses.en[category].some(keyword => input.includes(keyword))) {
                        if (category === 'greetings' || category === 'thanks') {
                            // Rotate responses to avoid repetition
                            const available = responses.en[category].responses.filter(r => !this.lastResponses.has(r));
                            return available.length > 0 ? available[0] : responses.en[category].responses[0];
                        }
                        return responses.en[category].responses[0];
                    }
                }

                // Default response (rotate)
                const defaults = responses.en.default;
                const availableDefault = defaults.filter(d => !this.lastResponses.has(d));
                return availableDefault.length > 0 ? availableDefault[0] : defaults[0];
            }

            addMessage(sender, text, type) {
                const responseArea = document.getElementById('responseArea');
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${type}-message`;
                messageDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
                responseArea.appendChild(messageDiv);
                responseArea.scrollTop = responseArea.scrollHeight;
            }

            updateStatus(state) {
                const status = document.getElementById('status');
                status.textContent = this.translations[this.currentLang][`status_${state}`];
            }

            onEnd() {
                this.isListening = false;
                document.getElementById('micBtn').className = 'mic-btn mic-idle';
                this.updateStatus('idle');
            }

            onError(event) {
                console.error('Speech error:', event.error);
                this.updateStatus('idle');
            }

            clearChat() {
                document.getElementById('responseArea').innerHTML = '';
                this.conversationHistory = [];
                this.lastResponses.clear();
                this.addMessage('SmartVoice AI', 'नया चैट शुरू! बोलें या टाइप करें 😊', 'ai');
            }
        }

        // Initialize
        window.addEventListener('load', () => {
            new SmartVoiceAssistant();
        });
    </script>
</body>
</html>
